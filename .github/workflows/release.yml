name: release

# A Companion module is a platform-independent JavaScript package (not a native
# binary). This packages it into the distributable .tgz via companion-module-build.
# Trigger manually (Actions > release > Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build module package
        run: npm run package

      - name: Collect package
        shell: bash
        run: |
          mkdir -p out
          # companion-module-build emits pkg/ and/or a .tgz depending on version
          find . -maxdepth 2 -name '*.tgz' -not -path './node_modules/*' -exec cp {} out/ \; || true
          if [ -d pkg ]; then tar czf "out/companion-module-presentationcommander-server-pkg.tgz" pkg; fi
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: companion-module-package
          path: out/*
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
